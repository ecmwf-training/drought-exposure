version: 1
project:
  title: Drought
  authors:
    - name: The Copernicus Climate Change Service (C3S)
    - name: entrusted to ECMWF (European Centre for Medium-Range Weather Forecasts)
  license: Apache-2.0
  open_access: true
  exclude:
    - developer/*
  github: jkeune/drought_exposure
  thebe:
    binder:
      repo: jkeune/drought_exposure
      provider: github
      url: https://mybinder.org
      ref: develop
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: intro.md
    - file: tutorials.ipynb
      title: Tutorials
      children:
        - title: Storylines
          children:
            - file: tutorials/drought_duration_exposure.ipynb
        - title: Explore Exposure Data
          children:
            - file: tutorials/population.ipynb
            - file: tutorials/agricultural_land.ipynb
    - file: how-to-guides.ipynb
      title: How-To Guides
      children:
        - title: Getting started
          children:
            - file: how-to-guides/download_data_from_cds.ipynb
            - file: how-to-guides/define_your_region.ipynb
        - title: Process Exposure Data
          children:
            - file: how-to-guides/population_ghs.ipynb
            - file: how-to-guides/agricultural_land_satellite.ipynb
            - file: how-to-guides/agricultural_land_corine.ipynb
        - title: Process Hazard Data
          children:
            - file: how-to-guides/drought_duration_ecde.ipynb
    - file: explanation.ipynb
      title: Explanation
      children:
        - title: About Droughts
          children:
            - file: explanation/what_is_drought.md
            - file: explanation/indices.md
        - title: Towards Drought Risk Assessments
          children: 
            - file: explanation/hazard.md
            - file: explanation/exposure.md
            - file: explanation/vulnerability.md
            - file: explanation/drought_risk.md
            - file: explanation/adaptation.md
    - file: references.ipynb
      title: References
      children:
        - file: references/valorada.md
        - file: references/ecde_data.md

site:
  options:
    folders: true
    # C3S logos
    logo: https://climate.copernicus.eu/sites/default/files/2025-03/logoline_c3s.png
    logo_dark: https://climate.copernicus.eu/sites/default/files/2025-03/logoline_c3s_neg.png
    logo_url: https://climate.copernicus.eu
    # CAMS logos
    # logo: https://climate.copernicus.eu/sites/default/files/2025-03/logoline_cams.png
    # logo_dark: https://climate.copernicus.eu/sites/default/files/2025-03/logoline_cams_neg.png
    # logo_url: https://atmosphere.copernicus.eu/

  template: book-theme
